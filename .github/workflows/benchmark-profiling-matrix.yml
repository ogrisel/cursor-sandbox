name: benchmark-profiling-matrix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "hgbdt_performance_analysis/**"
      - ".github/workflows/benchmark-profiling-matrix.yml"
  push:
    branches:
      - main
    paths:
      - "hgbdt_performance_analysis/**"
      - ".github/workflows/benchmark-profiling-matrix.yml"

jobs:
  benchmark-profile:
    name: "${{ matrix.machine_tag }}"
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-24.04
            machine_tag: linux-amd64
          - runs_on: ubuntu-24.04-arm
            machine_tag: linux-arm64
          - runs_on: macos-14
            machine_tag: macos-arm64
          - runs_on: windows-2022
            machine_tag: windows-amd64

    defaults:
      run:
        working-directory: hgbdt_performance_analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy psutil scikit-learn xgboost lightgbm matplotlib threadpoolctl

      - name: Install py-spy on non-Windows workers
        if: runner.os != 'Windows'
        run: python -m pip install py-spy

      - name: Run benchmark + profiling pipeline
        run: |
          python run_ci_benchmarks_profiles.py \
            --machine-tag "${{ matrix.machine_tag }}" \
            --artifacts-root artifacts

      - name: Upload machine-scoped artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "benchmark-profiles-${{ matrix.machine_tag }}"
          path: "hgbdt_performance_analysis/artifacts/machines/${{ matrix.machine_tag }}"
          if-no-files-found: error
